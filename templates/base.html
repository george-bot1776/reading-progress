<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Reading Tracker{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
        }
        
        nav a {
            color: #666;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: color 0.2s;
        }
        
        nav a:hover {
            color: #fff;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #22c55e;
            color: #000;
        }
        
        .btn-primary:hover {
            background: #16a34a;
        }
        
        .btn-secondary {
            background: #222;
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: #333;
        }
        
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        
        .flash {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .flash.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #22c55e;
        }
        
        .flash.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: #111;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #22c55e;
        }
        
        .stat-label {
            font-size: 13px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        .books-grid {
            display: grid;
            gap: 12px;
        }
        
        .book-item {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        
        .book-item:hover {
            background: #1a1a1a;
        }
        
        .book-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .book-info p {
            font-size: 14px;
            color: #666;
        }
        
        .book-meta {
            text-align: right;
            font-size: 13px;
            color: #555;
        }
        
        .book-meta .pages {
            color: #22c55e;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #444;
        }
        
        .empty-state h2 {
            margin-bottom: 12px;
            color: #555;
        }
        
        form {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #444;
        }
        
        .form-actions {
            display: flex;
            gap: 12px;
        }
        
        .book-detail {
            background: #111;
            padding: 40px;
            border-radius: 12px;
        }
        
        .book-detail h2 {
            font-size: 32px;
            margin-bottom: 12px;
        }
        
        .book-detail .author {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .detail-item {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
        }
        
        .detail-item .label {
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .detail-item .value {
            font-size: 18px;
            font-weight: 600;
        }
        
        .detail-item .value.green {
            color: #22c55e;
        }
        
        .detail-actions {
            display: flex;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid #222;
        }
        
        .upload-area {
            border: 2px dashed #333;
            padding: 60px 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #444;
        }
        
        .upload-area p {
            color: #666;
            margin-bottom: 20px;
        }
    </style>
    {% block extra %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Reading Tracker</h1>
            <nav>
                <a href="/">Dashboard</a>
                <a href="/add">Add Book</a>
                <a href="/import">Import</a>
            </nav>
        </header>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
